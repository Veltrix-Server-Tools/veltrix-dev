<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Posts — Veltrix Server Tools</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>

    .posts-hero {
      padding: 80px 0 40px;
      text-align: center;
    }

    .posts-hero h1 {
      font-size: 36px;
    }

    .posts-hero p {
      max-width: 600px;
      margin: auto;
    }

    .badge {
      display: inline-block;
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    /* ── Filter Bar ── */

    .tag-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 40px 0 50px;
    }

    .tag-btn {
      padding: 7px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      transition: 0.3s;
    }

    .tag-btn:hover,
    .tag-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }

    /* ── Post Cards ── */

    .posts-grid {
      display: grid;
      gap: 28px;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    }

    .post-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: 0.3s;
      cursor: pointer;
    }

    .post-card:hover {
      border-color: var(--accent);
    }

    .post-card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .post-category {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .post-date {
      font-size: 12px;
      color: var(--muted);
    }

    .post-card h3 {
      font-size: 17px;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .post-card p {
      font-size: 13px;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .post-tag {
      display: inline-block;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 12px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 14px;
    }

    .read-link {
      font-size: 13px;
      color: var(--accent);
      font-weight: 600;
    }

    /* ── Loading & Empty States ── */

    .state-msg {
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
      font-size: 15px;
    }

    /* ── Pagination ── */

    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 60px;
    }

    .page-btn {
      padding: 8px 18px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      transition: 0.3s;
    }

    .page-btn:hover,
    .page-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }

    /* ── Stats Bar ── */

    .posts-stats {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .posts-count {
      font-size: 14px;
      color: var(--muted);
    }

    .posts-count span {
      color: var(--accent);
      font-weight: 700;
    }

  </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="container">
    <a href="../index.html"><h2>Veltrix</h2></a>
    <div class="nav-links">
      <a href="../free-toolkit.html">Free Toolkit</a>
      <a href="../premium.html">Premium</a>
      <a href="index.html">Posts</a>
    </div>
  </div>
</div>

<!-- HERO -->
<section class="posts-hero">
  <div class="container">
    <span class="badge">Hytale Operator Intelligence</span>
    <h1>Posts & Guides</h1>
    <p>
      Infrastructure breakdowns, economy analysis,
      and operator guides. Updated automatically.
    </p>
  </div>
</section>

<section class="section">
  <div class="container">

    <!-- TAG FILTER -->
    <div class="tag-bar" id="tagBar">
      <button class="tag-btn active" onclick="filterTag('all', this)">All</button>
      <button class="tag-btn" onclick="filterTag('Economy', this)">Economy</button>
      <button class="tag-btn" onclick="filterTag('Protection', this)">Protection</button>
      <button class="tag-btn" onclick="filterTag('Network', this)">Network</button>
      <button class="tag-btn" onclick="filterTag('Events', this)">Events</button>
      <button class="tag-btn" onclick="filterTag('Progression', this)">Progression</button>
      <button class="tag-btn" onclick="filterTag('Guide', this)">Guides</button>
    </div>

    <!-- STATS BAR -->
    <div class="posts-stats">
      <div class="posts-count">
        Showing <span id="postCountShown">0</span> of
        <span id="postCountTotal">0</span> posts
      </div>
      <div class="posts-count">
        Last updated: <span id="lastUpdated">—</span>
      </div>
    </div>

    <!-- POSTS GRID -->
    <div id="postsGrid" class="posts-grid">
      <div class="state-msg">Loading posts...</div>
    </div>

    <!-- PAGINATION -->
    <div class="pagination" id="pagination"></div>

  </div>
</section>

<!-- FOOTER -->
<div class="footer">
  © 2026 Veltrix Server Tools — Built for Infrastructure Operators
</div>

<script>
  var allPosts      = [];
  var filteredPosts = [];
  var currentPage   = 1;
  var PAGE_SIZE     = 9;

  // ── Boot
  fetch("data/index.json?v=" + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      allPosts      = (data.posts || []).slice();
      filteredPosts = allPosts;
      updateStats();
      renderPage(1);
    })
    .catch(function(err) {
      document.getElementById("postsGrid").innerHTML =
        '<div class="state-msg">Could not load posts. Please refresh.</div>';
      console.error("Index fetch error:", err);
    });

  // ── Filter by tag/category
  function filterTag(tag, btn) {
    document.querySelectorAll(".tag-btn").forEach(function(b) {
      b.classList.remove("active");
    });
    btn.classList.add("active");

    filteredPosts = (tag === "all")
      ? allPosts
      : allPosts.filter(function(p) {
          return p.category === tag || p.tag === tag;
        });

    currentPage = 1;
    updateStats();
    renderPage(1);
  }

  // ── Render one page of cards
  function renderPage(page) {
    currentPage  = page;
    var start    = (page - 1) * PAGE_SIZE;
    var slice    = filteredPosts.slice(start, start + PAGE_SIZE);
    var grid     = document.getElementById("postsGrid");

    if (slice.length === 0) {
      grid.innerHTML =
        '<div class="state-msg">No posts found in this category.</div>';
      document.getElementById("pagination").innerHTML = "";
      return;
    }

    var html = "";
    for (var i = 0; i < slice.length; i++) {
      html += buildCard(slice[i]);
    }
    grid.innerHTML = html;
    renderPagination();
  }

  // ── Build a single post card
  function buildCard(post) {
    var imageBlock = "";

    if (post.image) {
      imageBlock =
        '<div style="' +
          'margin:-28px -28px 20px -28px;' +
          'border-radius:10px 10px 0 0;' +
          'overflow:hidden;' +
          'height:180px;' +
          'background:var(--bg);' +
          'border-bottom:1px solid var(--border);">' +
        '<img' +
          ' src="' + post.image + '"' +
          ' alt="' + escapeHtml(post.title) + '"' +
          ' loading="lazy"' +
          ' style="width:100%;height:100%;object-fit:cover;display:block;"' +
          ' onerror="this.parentElement.style.display=\'none\'">' +
        '</div>';
    } else {
      imageBlock =
        '<div style="' +
          'margin:-28px -28px 20px -28px;' +
          'border-radius:10px 10px 0 0;' +
          'height:6px;' +
          'background:var(--accent);' +
          'opacity:0.4;">' +
        '</div>';
    }

    var safeFile = encodeURIComponent(post.file || post.id + ".json");

    return (
      '<div class="post-card" onclick="openPost(\'' + safeFile + '\')">' +
        imageBlock +
        '<div>' +
          '<div class="post-card-meta">' +
            '<span class="post-category">' + escapeHtml(post.category || "") + '</span>' +
            '<span class="post-date">'     + formatDate(post.date)            + '</span>' +
          '</div>' +
          '<span class="post-tag">'    + escapeHtml(post.tag     || "") + '</span>' +
          '<h3>'                       + escapeHtml(post.title   || "") + '</h3>' +
          '<p>'                        + escapeHtml(post.excerpt || "") + '</p>' +
        '</div>' +
        '<span class="read-link">Read More &#8594;</span>' +
      '</div>'
    );
  }

  // ── Pagination controls
  function renderPagination() {
    var total     = Math.ceil(filteredPosts.length / PAGE_SIZE);
    var container = document.getElementById("pagination");
    if (total <= 1) { container.innerHTML = ""; return; }
    var html = "";
    for (var i = 1; i <= total; i++) {
      html +=
        '<button class="page-btn ' + (i === currentPage ? "active" : "") + '"' +
        ' onclick="renderPage(' + i + ')">' + i + '</button>';
    }
    container.innerHTML = html;
  }

  // ── Stats bar
  function updateStats() {
    var shown = Math.min(
      PAGE_SIZE * currentPage,
      filteredPosts.length
    );
    document.getElementById("postCountShown").textContent =
      Math.min(PAGE_SIZE, filteredPosts.length);
    document.getElementById("postCountTotal").textContent =
      filteredPosts.length;
    if (allPosts.length > 0 && allPosts[0].date) {
      document.getElementById("lastUpdated").textContent =
        formatDate(allPosts[0].date);
    }
  }

  // ── Navigate to single post reader
  function openPost(file) {
    window.location.href = "post.html?file=" + file;
  }

  // ── Format ISO date string
  function formatDate(dateStr) {
    if (!dateStr) return "";
    try {
      var d = new Date(dateStr);
      return d.toLocaleDateString("en-US", {
        year: "numeric", month: "long", day: "numeric"
      });
    } catch(e) {
      return dateStr;
    }
  }

  // ── Escape HTML to prevent XSS in card content
  function escapeHtml(str) {
    if (!str) return "";
    return str
      .replace(/&/g,  "&amp;")
      .replace(/</g,  "&lt;")
      .replace(/>/g,  "&gt;")
      .replace(/"/g,  "&quot;")
      .replace(/'/g,  "&#39;");
  }
</script>

</body>
</html>
