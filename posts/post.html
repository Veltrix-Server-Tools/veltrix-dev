<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Post — Veltrix Server Tools</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>

    .post-header {
      padding: 80px 0 40px;
      max-width: 760px;
      margin: auto;
    }

    .post-header .badge {
      display: inline-block;
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .post-header h1 {
      font-size: 32px;
      line-height: 1.4;
      margin-bottom: 16px;
    }

    .post-byline {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 40px;
    }

    /* ── Post Body ── */

    .post-body {
      max-width: 760px;
      margin: auto;
      padding-bottom: 80px;
    }

    .post-body h2 {
      font-size: 22px;
      margin: 40px 0 16px;
      color: var(--text);
    }

    .post-body p {
      font-size: 15px;
      line-height: 1.85;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .post-callout {
      border-left: 3px solid var(--accent);
      background: var(--accent-soft);
      padding: 18px 22px;
      border-radius: 0 8px 8px 0;
      margin: 30px 0;
      font-size: 14px;
      color: var(--text);
      line-height: 1.7;
    }

    .post-cta {
      background: var(--card);
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 28px;
      margin: 40px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .post-cta p {
      margin: 0;
      font-size: 14px;
    }

    /* ── Related Posts ── */

    .related-section {
      border-top: 1px solid var(--border);
      padding-top: 50px;
      max-width: 760px;
      margin: auto;
    }

    .related-section h3 {
      font-size: 18px;
      margin-bottom: 25px;
    }

    .related-grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .related-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      cursor: pointer;
      transition: 0.3s;
    }

    .related-card:hover {
      border-color: var(--accent);
    }

    .related-card h4 {
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
    }

    /* ── Back Link ── */

    .back-link {
      display: inline-block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 30px;
    }

    .back-link:hover {
      color: var(--accent);
    }

  </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="container">
    <a href="../index.html"><h2>Veltrix</h2></a>
    <div class="nav-links">
      <a href="../free-toolkit.html">Free Toolkit</a>
      <a href="../premium.html">Premium</a>
      <a href="index.html">Posts</a>
    </div>
  </div>
</div>

<!-- POST CONTENT -->
<div class="container">

  <div class="post-header" id="postHeader">
    <div class="state-msg">Loading post...</div>
  </div>

  <div class="post-body" id="postBody"></div>

  <div class="related-section" id="relatedSection" style="display:none;">
    <h3>Related Posts</h3>
    <div class="related-grid" id="relatedGrid"></div>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 Veltrix Server Tools — Built for Infrastructure Operators
</div>

<script>
  var params   = new URLSearchParams(window.location.search);
  var postFile = params.get("file");

  if (!postFile) {
    document.getElementById("postHeader").innerHTML =
      '<p>No post specified. <a href="index.html">Back to posts</a></p>';
  } else {
    var fetchFile = decodeURIComponent(postFile);
    fetch("data/" + fetchFile + "?v=" + Date.now())
      .then(function(r) { return r.json(); })
      .then(function(post) {
        renderPost(post);
        document.title = post.title + " — Veltrix";
      })
      .catch(function() {
        document.getElementById("postHeader").innerHTML =
          '<p>Post not found. <a href="index.html">Back to posts</a></p>';
      });
  }

  function renderPost(post) {
    // ── Header
    document.getElementById("postHeader").innerHTML =
      '<a class="back-link" href="index.html">&#8592; Back to Posts</a>' +
      '<span class="badge">' + escapeHtml(post.category || "") + '</span>' +
      '<h1>' + escapeHtml(post.title || "") + '</h1>' +
      '<div class="post-byline">' +
        'By ' + escapeHtml(post.author || "Veltrix") +
        ' &nbsp;&middot;&nbsp; ' + formatDate(post.date) +
        ' &nbsp;&middot;&nbsp; ' + escapeHtml(post.tag || "") +
      '</div>';

    // ── Hero image (if present)
    var body = document.getElementById("postBody");
    body.innerHTML = "";

    if (post.image) {
      var imgWrap = document.createElement("div");
      imgWrap.style.cssText =
        "margin:0 0 40px 0;border-radius:10px;overflow:hidden;" +
        "border:1px solid var(--border);max-height:420px;";

      var img = document.createElement("img");
      img.src   = post.image;
      img.alt   = post.title || "";
      img.style.cssText =
        "width:100%;display:block;object-fit:cover;max-height:420px;";
      img.onerror = function() {
        imgWrap.style.display = "none";
      };
      imgWrap.appendChild(img);
      body.appendChild(imgWrap);
    }

    // ── Content blocks
    var blocks = post.content || [];
    for (var i = 0; i < blocks.length; i++) {
      var block = blocks[i];
      var el;

      if (block.type === "heading") {
        el = document.createElement("h2");
        el.textContent = block.text || "";

      } else if (block.type === "paragraph") {
        el = document.createElement("p");
        el.textContent = block.text || "";

      } else if (block.type === "callout") {
        el = document.createElement("div");
        el.className   = "post-callout";
        el.textContent = block.text || "";

      } else if (block.type === "cta") {
        el = document.createElement("div");
        el.className = "post-cta";
        var ctaText = document.createElement("p");
        ctaText.textContent = block.text || "";
        var ctaBtn  = document.createElement("a");
        ctaBtn.href      = block.url   || "../premium.html";
        ctaBtn.className = "btn btn-primary";
        ctaBtn.textContent = block.label || "View Module";
        el.appendChild(ctaText);
        el.appendChild(ctaBtn);

      } else {
        continue;
      }

      body.appendChild(el);
    }

    // ── Related posts
    if (post.related && post.related.length > 0) {
      loadRelated(post.related);
    }
  }

  function loadRelated(ids) {
    fetch("data/index.json?v=" + Date.now())
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var posts = data.posts || [];
        var related = posts.filter(function(p) {
          return ids.indexOf(p.id) > -1;
        });
        if (related.length === 0) return;

        var section = document.getElementById("relatedSection");
        var grid    = document.getElementById("relatedGrid");
        section.style.display = "block";

        var html = "";
        for (var i = 0; i < related.length; i++) {
          var p = related[i];
          html +=
            '<div class="related-card"' +
            ' onclick="window.location.href=\'post.html?file=' +
            encodeURIComponent(p.file || p.id + ".json") + '\'">' +
            '<h4>' + escapeHtml(p.title) + '</h4>' +
            '</div>';
        }
        grid.innerHTML = html;
      })
      .catch(function() {});
  }

  function formatDate(dateStr) {
    if (!dateStr) return "";
    try {
      return new Date(dateStr).toLocaleDateString("en-US", {
        year: "numeric", month: "long", day: "numeric"
      });
    } catch(e) { return dateStr; }
  }

  function escapeHtml(str) {
    if (!str) return "";
    return str
      .replace(/&/g,  "&amp;")
      .replace(/</g,  "&lt;")
      .replace(/>/g,  "&gt;")
      .replace(/"/g,  "&quot;")
      .replace(/'/g,  "&#39;");
  }
</script>

</body>
</html>
