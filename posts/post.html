<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Post — Veltrix Server Tools</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>

    .post-header {
      padding: 80px 0 40px;
      max-width: 760px;
      margin: auto;
    }

    .post-header .badge {
      display: inline-block;
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .post-header h1 {
      font-size: 32px;
      line-height: 1.4;
      margin-bottom: 16px;
    }

    .post-byline {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 40px;
    }

    /* ── Post Body ── */

    .post-body {
      max-width: 760px;
      margin: auto;
      padding-bottom: 80px;
    }

    .post-body h2 {
      font-size: 22px;
      margin: 40px 0 16px;
      color: var(--text);
    }

    .post-body p {
      font-size: 15px;
      line-height: 1.85;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .post-callout {
      border-left: 3px solid var(--accent);
      background: var(--accent-soft);
      padding: 18px 22px;
      border-radius: 0 8px 8px 0;
      margin: 30px 0;
      font-size: 14px;
      color: var(--text);
      line-height: 1.7;
    }

    .post-cta {
      background: var(--card);
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 28px;
      margin: 40px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .post-cta p {
      margin: 0;
      font-size: 14px;
    }

    /* ── Related Posts ── */

    .related-section {
      border-top: 1px solid var(--border);
      padding-top: 50px;
      max-width: 760px;
      margin: auto;
    }

    .related-section h3 {
      font-size: 18px;
      margin-bottom: 25px;
    }

    .related-grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .related-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      cursor: pointer;
      transition: 0.3s;
    }

    .related-card:hover {
      border-color: var(--accent);
    }

    .related-card h4 {
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
    }

    /* ── Back Link ── */

    .back-link {
      display: inline-block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 30px;
    }

    .back-link:hover {
      color: var(--accent);
    }

  </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="container">
    <a href="../index.html"><h2>Veltrix</h2></a>
    <div class="nav-links">
      <a href="../free-toolkit.html">Free Toolkit</a>
      <a href="../premium.html">Premium</a>
      <a href="index.html">Posts</a>
    </div>
  </div>
</div>

<!-- POST CONTENT -->
<div class="container">

  <div class="post-header" id="postHeader">
    <div class="state-msg">Loading post...</div>
  </div>

  <div class="post-body" id="postBody"></div>

  <div class="related-section" id="relatedSection" style="display:none;">
    <h3>Related Posts</h3>
    <div class="related-grid" id="relatedGrid"></div>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 Veltrix Server Tools — Built for Infrastructure Operators
</div>

<script>
  // ── Read file param from URL
  const params   = new URLSearchParams(window.location.search);
  const postFile = params.get("file");

  if (!postFile) {
    document.getElementById("postHeader").innerHTML =
      '<p>No post specified. <a href="index.html">Back to posts →</a></p>';
  } else {
    fetch("data/" + postFile + "?v=" + Date.now())
      .then(r => r.json())
      .then(post => {
        renderPost(post);
        document.title = post.title + " — Veltrix";
      })
      .catch(() => {
        document.getElementById("postHeader").innerHTML =
          '<p>Post not found. <a href="index.html">Back to posts →</a></p>';
      });
  }

  // ── Render post header + body
  function renderPost(post) {
    const formatDate = (d) => new Date(d).toLocaleDateString("en-US", {
      year: "numeric", month: "long", day: "numeric"
    });

    // Header
    document.getElementById("postHeader").innerHTML = `
      <a class="back-link" href="index.html">← Back to Posts</a>
      <span class="badge">${post.category}</span>
      <h1>${post.title}</h1>
      <div class="post-byline">
        By ${post.author || 'Veltrix'} &nbsp;·&nbsp; ${formatDate(post.date)}
        &nbsp;·&nbsp; ${post.tag}
      </div>
    `;

    // Body blocks
    const body  = document.getElementById("postBody");
    body.innerHTML = post.content.map(block => {
      if (block.type === "heading") {
        return `<h2>${block.text}</h2>`;
      }
      if (block.type === "paragraph") {
        return `<p>${block.text}</p>`;
      }
      if (block.type === "callout") {
        return `<div class="post-callout">${block.text}</div>`;
      }
      if (block.type === "cta") {
        return `
          <div class="post-cta">
            <p>${block.text}</p>
            <a href="${block.url}" class="btn btn-primary">${block.label}</a>
          </div>
        `;
      }
      return "";
    }).join("");

    // Related posts
    if (post.related && post.related.length > 0) {
      loadRelated(post.related);
    }
  }

  // ── Load related post stubs
  function loadRelated(ids) {
    fetch("data/index.json?v=" + Date.now())
      .then(r => r.json())
      .then(data => {
        const related = data.posts.filter(p => ids.includes(p.id));
        if (related.length === 0) return;

        document.getElementById("relatedSection").style.display = "block";
        document.getElementById("relatedGrid").innerHTML =
          related.map(p => `
            <div class="related-card"
                 onclick="window.location.href='post.html?file=${p.file}'">
              <h4>${p.title}</h4>
            </div>
          `).join("");
      });
  }
</script>

</body>
</html>
